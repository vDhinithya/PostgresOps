services:

  postgres-primary:

    image: postgres:16
    container_name: postgresops-primary
    hostname: postgresops-primary

    env_file:
      - ../../env/postgres.env

    restart: unless-stopped


    ports:
      - "5432:5432"

    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf


    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ../../configs/postgres:/etc/postgresql:ro

    networks:
      - postgresops-network

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgresops" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-replica1:

    image: postgres:16

    container_name: postgresops-replica1

    hostname: postgresops-replica1

    env_file:
      - ../../env/postgres.env

    restart: unless-stopped

    depends_on:
      postgres-primary:
        condition: service_healthy

    volumes:
      - postgres-replica1-data:/var/lib/postgresql/data

      - ../../docker/postgres/replica1/scripts:/scripts:ro

    networks:
      - postgresops-network

    entrypoint: ["/bin/bash", "/scripts/init-replica.sh"]

  postgres-replica2:
    image: postgres:16
    container_name: postgresops-replica2
    hostname: postgresops-replica2

    env_file:
      - ../../env/postgres.env

    restart: unless-stopped

    depends_on:
      postgres-primary:
        condition: service_healthy

    volumes:
      - postgres-replica2-data:/var/lib/postgresql/data
      - ../../docker/postgres/replica2/scripts:/scripts:ro

    networks:
      - postgresops-network

    entrypoint: [ "/bin/bash", "/scripts/init-replica.sh" ]

  pgadmin:

    image: dpage/pgadmin4:latest

    container_name: postgresops-pgadmin

    hostname: postgresops-pgadmin

    env_file:
      - ../../env/pgadmin.env

    restart: unless-stopped

    depends_on:
      postgres-primary:
        condition: service_healthy

    ports:
      - "5050:80"

    volumes:
      - pgadmin-data:/var/lib/pgadmin

    networks:
      - postgresops-network

volumes:

  postgres-primary-data:

  postgres-replica1-data:

  postgres-replica2-data:

  pgadmin-data:

networks:

  postgresops-network:
    driver: bridge