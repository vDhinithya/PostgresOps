services:

  postgres-primary:

    image: postgres:16
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    env_file:
      - ../../env/postgres.env

    container_name: postgresops-primary

    hostname: postgresops-primary

    restart: unless-stopped

    ports:
      - "5432:5432"

    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ../../configs/postgres:/etc/postgresql:ro

    networks:
      - postgresops-network

volumes:

  postgres-primary-data:

networks:

  postgresops-network:
    driver: bridge