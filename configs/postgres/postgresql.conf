# ==========================================
# PostgreSQL Configuration
# Project: PostgresOps
# ==========================================

# -----------------------------------------------------------------------------
# CONNECTIONS
# -----------------------------------------------------------------------------

listen_addresses = '*'
port = 5432

# -----------------------------------------------------------------------------
# MEMORY
# -----------------------------------------------------------------------------

shared_buffers = 128MB

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------

logging_collector = on
log_destination = 'stderr'
log_connections = on
log_disconnections = on

# -----------------------------------------------------------------------------
# WAL (defaults for now)
# -----------------------------------------------------------------------------
# Replication settings will be added in Phase 1.4

# -----------------------------------------------------------------------------
# Authentication
# -----------------------------------------------------------------------------

hba_file = '/etc/postgresql/pg_hba.conf'

